<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HIEUTHUHAI Clone</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #05070d;
      color: white;
      overflow-x: hidden;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 40px;
      background: linear-gradient(90deg, #001c4d, #0a2d75);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .logo {
      font-size: 28px;
      font-weight: 800;
      color: #e50914;
    }

    .nav-links {
      display: flex;
      gap: 32px;
      font-weight: 600;
      font-size: 14px;
    }

    .nav-icons {
      display: flex;
      gap: 18px;
      font-size: 20px;
    }

    .hero {
      padding: 0;
      position: relative;
      min-height: 100vh;
      padding: 60px 40px;
      background:
        radial-gradient(circle at 20% 20%, rgba(0,140,255,0.3), transparent 30%),
        radial-gradient(circle at 80% 20%, rgba(255,255,255,0.12), transparent 20%),
        linear-gradient(135deg, #021126, #000000 75%);
    }

    .hero-content {
      max-width: 100%;
      max-width: 1400px;
      margin: auto;
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 40px;
      align-items: center;
    }

    .title-small {
      font-size: 14px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.7);
      margin-bottom: 16px;
    }

    .main-title {
      font-size: 92px;
      font-weight: 900;
      line-height: 1;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .artist-name {
      font-size: 34px;
      letter-spacing: 16px;
      color: rgba(255,255,255,0.85);
      margin-bottom: 40px;
    }

    .video-card {
      position: relative;
      border-radius: 30px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    .video-card img {
      width: 100%;
      height: 100vh;
      object-fit: cover;
      display: block;
    }

    .play-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: none;
      background: #ff0000;
      color: white;
      font-size: 34px;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(255,0,0,0.4);
    }

    .artist-panel {
      position: relative;
      border-radius: 36px;
      padding: 24px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }

    .artist-panel img {
      width: 100%;
      height: 100vh;
      object-fit: cover;
      border-radius: 28px;
      display: block;
    }

    .stats {
      padding: 70px 40px;
      background: #0a0a0f;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .stats-grid {
      max-width: 1400px;
      margin: auto;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 24px;
    }

    .stat-box {
      padding: 28px;
      border-radius: 24px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .stat-label {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stat-value {
      margin-top: 14px;
      font-size: 46px;
      font-weight: 900;
      color: #ff2b2b;
    }

    @media (max-width: 1024px) {
      .hero-content,
      .stats-grid {
        grid-template-columns: 1fr;
      }

      .main-title {
        font-size: 56px;
      }

      .artist-name {
        font-size: 24px;
        letter-spacing: 8px;
      }

      .nav-links {
        display: none;
      }
    }
  </style>
</head>
<body>
  <header class="navbar">
    <div class="logo">HIEUTHUHAI</div>
    <nav class="nav-links">
      <a href="#">HOME</a>
      <a href="#">THE ARTIST</a>
      <a href="#">CONTENT</a>
      <a href="#">FAN UNIVERSE</a>
      <a href="#">SHOP</a>
    </nav>
    <div class="nav-icons">
      <span>🛍️</span>
      <span>🔔</span>
      <span>👤</span>
    </div>
  </header>

  <section class="hero">
    <div class="hero-content">
      <div>
        <p class="title-small">GENfest Presents MBILLION 2025</p>
        <h1 class="main-title">NƯỚC MẮT CÁ SẤU</h1>
        <p class="artist-name">HIEUTHUHAI</p>

        <div class="video-card">
          <img src="https://cdnv2.tgdd.vn/bhx-static/bhx/News/Images/2025/04/04/1576562/hinh-bai-tin-bhx-84_202504041606071529.jpg" alt="Live show" />
          <button class="play-btn" id="playBtn">▶</button>
        </div>
      </div>

      <div class="artist-panel">
        <img src="https://cdnv2.tgdd.vn/bhx-static/bhx/News/Images/2025/04/04/1576562/hinh-bai-tin-bhx-84_202504041606071529.jpg" alt="HIEUTHUHAI" />
      </div>
    </div>
  </section>

  <script type="module">
    const playBtn = document.getElementById('playBtn');

    if (playBtn) {
      playBtn.addEventListener('click', () => {
        window.open('https://www.youtube.com/watch?v=oq46WIBOuQ8', '_blank');
      });
    }
  </script>
  <section style="padding: 40px; background: #05070d;">
    <img
      src="https://image.static.bstage.in/cdn-cgi/image/metadata=none,dpr=2,width=2048/hieuthuhai/5c4d4171-c7de-409d-9d88-32f8bac9542c/b0c5eefe-3b58-49fd-b324-3e4961ba298a/ori.png"
      alt="HIEUTHUHAI full image"
      style="width: 100%; height: auto; display: block; border-radius: 24px; object-fit: cover;"
    />
  </section>
</body>
</html>
